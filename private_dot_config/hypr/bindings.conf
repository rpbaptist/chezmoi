# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser
$mod = SUPER

unbind = SUPER CTRL, T
bindd = SUPER CTRL, T, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
unbind = SUPER CTRL, F
bindd = SUPER CTRL, F, File manager, exec, uwsm app -- nautilus --new-window
unbind = SUPER CTRL, B
bindd = SUPER CTRL, B, Browser, exec, $browser
bindd = SUPER CTRL, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER CTRL, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER CTRL, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER CTRL, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
unbind = SUPER SHIFT, SPACE
unbind = SUPER ALT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

# Unified clipboard
unbind = SUPER, C
unbind = SUPER, X
unbind = SUPER, V
unbind = SUPER CTRL, V
unbind = SUPER CTRL, H

bindd = SUPER CTRL, H, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Control tiling
bindd = SUPER, F, Force full screen, fullscreen, 0

unbind = SUPER CTRL, SPACE
bindd = SUPER CTRL, SPACE, Omarchy menu, exec, omarchy-menu

# Move focus with mod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, n, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, i, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, u, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, e, movefocus, d

# to move window
bind = $mod SHIFT,up, movewindow, u
bind = $mod SHIFT,u, movewindow, u
bind = $mod SHIFT,down, movewindow, d
bind = $mod SHIFT,e, movewindow, d
bind = $mod SHIFT,left, movewindow, l
bind = $mod SHIFT,n, movewindow, l
bind = $mod SHIFT,right, movewindow, r
bind = $mod SHIFT,i, movewindow, r

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace with focused container with ALT + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod CTRL SHIFT, 1, movetoworkspacesilent, 1
bind = $mod CTRL SHIFT, 2, movetoworkspacesilent, 2
bind = $mod CTRL SHIFT, 3, movetoworkspacesilent, 3
bind = $mod CTRL SHIFT, 4, movetoworkspacesilent, 4
bind = $mod CTRL SHIFT, 5, movetoworkspacesilent, 5
bind = $mod CTRL SHIFT, 6, movetoworkspacesilent, 6
bind = $mod CTRL SHIFT, 7, movetoworkspacesilent, 7
bind = $mod CTRL SHIFT, 8, movetoworkspacesilent, 8
bind = $mod CTRL SHIFT, 9, movetoworkspacesilent, 9
bind = $mod CTRL SHIFT, 0, movetoworkspacesilent, 10

bind = $mod, bracketleft, workspace, -1
bind = $mod, bracketright, workspace, +1

bind = $mod ALT, bracketleft, movetoworkspace, -1
bind = $mod ALT, bracketright, movetoworkspace, +1

# resize windows

unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21


bindd = $mod CTRL ALT, N, Expand window left, resizeactive, -100 0    # - key
bindd = $mod CTRL ALT, I, Shrink window left, resizeactive, 100 0     # = key
bindd = $mod CTRL ALT, U, Shrink window up, resizeactive, 0 -100
bindd = $mod CTRL ALT, E, Expand window down, resizeactive, 0 100



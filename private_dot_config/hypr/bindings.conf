# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = google-chrome-stable
$mod = SUPER
$meta_mod = SUPER CTRL

unbind = SUPER, O
unbind = SUPER, J
unbind = $meta_mod, N
unbind = $meta_mod, T
unbind = $meta_mod, F
unbind = $meta_mod, B
unbind = SUPER SHIFT, E
unbind = $mod SHIFT, SPACE
unbind = SUPER ALT, F
unbind = $mod, S
unbind = $mod ALT, S
unbind = $mod, C
unbind = $mod, X
unbind = $mod, V
unbind = $meta_mod, V
unbind = $meta_mod, H
unbind = $meta_mod, SPACE
# resize windows
unbind = $mod, code:20
unbind = $mod, code:21
unbind = $mod SHIFT, code:20
unbind = $mod SHIFT, code:21
# Mouse control
unbind = $mod, mouse:272
unbind = $mod, mouse:273


bindd = $meta_mod, T, Terminal, exec, $terminal
bindd = CTRL SHIFT, ESCAPE, Activity, exec, omarchy-launch-tui btop
bindd = $meta_mod, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = $meta_mod, B, Browser, exec, $browser

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = $mod SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = $meta_mod, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
bindd = $mod, O, Toggle window split, layoutmsg, togglesplit
bindd = $mod ALT, M, Tiled full screen, fullscreenstate, 0 2
bindd = $mod, M, Maximize window, fullscreen, 1

bindd = $meta_mod, H, Clipboard manager, exec, omarchy-launch-walker -m clipboard

bindd = $mod, F, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# Control tiling
bindd = $mod, F, Force full screen, fullscreen, 0
bindd = $mod SHIFT, H, Show hidden windows, togglespecialworkspace

# Control scratchpad
bindd = $mod ALT, H, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = $mod, H, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

bindd = $meta_mod, SPACE, Omarchy menu, exec, omarchy-menu

# Move focus with mod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, n, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, i, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, u, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, e, movefocus, d

# to move window
bind = $mod SHIFT,up, movewindow, u
bind = $mod SHIFT,u, movewindow, u
bind = $mod SHIFT,down, movewindow, d
bind = $mod SHIFT,e, movewindow, d
bind = $mod SHIFT,left, movewindow, l
bind = $mod SHIFT,n, movewindow, l
bind = $mod SHIFT,right, movewindow, r
bind = $mod SHIFT,i, movewindow, r

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace with focused container with ALT + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $meta_mod SHIFT, 1, movetoworkspacesilent, 1
bind = $meta_mod SHIFT, 2, movetoworkspacesilent, 2
bind = $meta_mod SHIFT, 3, movetoworkspacesilent, 3
bind = $meta_mod SHIFT, 4, movetoworkspacesilent, 4
bind = $meta_mod SHIFT, 5, movetoworkspacesilent, 5
bind = $meta_mod SHIFT, 6, movetoworkspacesilent, 6
bind = $meta_mod SHIFT, 7, movetoworkspacesilent, 7
bind = $meta_mod SHIFT, 8, movetoworkspacesilent, 8
bind = $meta_mod SHIFT, 9, movetoworkspacesilent, 9
bind = $meta_mod SHIFT, 0, movetoworkspacesilent, 10

bind = $mod, bracketleft, workspace, -1
bind = $mod, bracketright, workspace, +1

bind = $mod ALT, bracketleft, movetoworkspace, -1
bind = $mod ALT, bracketright, movetoworkspace, +1


bindd = $meta_mod ALT, N, Expand window left, resizeactive, -100 0    # - key
bindd = $meta_mod ALT, I, Shrink window left, resizeactive, 100 0     # = key
bindd = $meta_mod ALT, U, Shrink window up, resizeactive, 0 -100
bindd = $meta_mod ALT, E, Expand window down, resizeactive, 0 100


bindmd = CTRL ALT, mouse:272, Move window, movewindow
bindmd = ALT, mouse:272, Resize window, resizewindow

bind = , mouse:275, workspace, e-1
bind = , mouse:276, workspace, e+1


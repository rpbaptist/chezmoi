format = """
([ $username$hostname ](bg:#3c3836)\
[ΌΓ▒ ](fg:black bg:#3c3836))\
\
[ $directory ](bg:#3c3836)\
[([ΌΓ▒ ](fg:black bg:#3c3836)\
$elixir\
$golang\
$custom\
$c\
$nodejs )](bg:#3c3836)\
\
[([ΌΓ▒ ](fg:black bg:#3c3836)\
$git_branch\
$git_commit\
$git_state\
$git_status )](fg:bright-cyan bg:#3c3836)\
\
[ΌΓ░](#3c3836)\
$line_break\
($sudo )$character
"""

command_timeout = 600

continuation_prompt = 'ΌΚ║'

[sudo]
disabled = true
style = 'bright-purple'
symbol = 'ΎΓε'
format = '[$symbol]($style)'

[character]
success_symbol = "[έζψ](blue)"
error_symbol = "[έζψ](red)"
vimcmd_symbol = "[έζχ](green)"

[directory]
read_only = " ≤░Ν╛"
read_only_style = "fg:bright-red bg:#3c3836"
style = "fg:yellow bg:#3c3836"
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = "≤░αυ "
truncation_length = 40
style = "fg:bright-cyan bg:#3c3836"
format = "[$symbol$branch]($style)"

[git_commit]
tag_symbol = " ≤░Υ╣ "
style = "fg:bright-cyan bg:#3c3836"
format = '[\($hash$tag\)]($style)'

[git_status]
stashed = "έΚκ"
ahead = '[ΎΥ▓](fg:cyan bg:#3c3836)'
up_to_date = "[έεΦ](bold fg:cyan bg:#3c3836)"
behind = '[ΎΥψ](fg:bright-red bg:#3c3836)'
diverged = "[έεΩ](fg:bold bright-red bg:#3c3836)"
staged = '[+](fg:bold cyan bg:#3c3836)'
deleted = '[-](fg:bold bright-red bg:#3c3836)'
untracked = '[?](fg:bright-yellow bg:#3c3836)'
renamed = '[┬╗](fg:bright-yellow bg:#3c3836)'
modified = "[έΚι](fg:bright-yellow bg:#3c3836)"
typechanged = ''
style = 'bg:#3c3836'
format = "[( $ahead_behind)( $all_status)]($style)"

[git_state]
style = "fg:bright-yellow bg:#3c3836"
format = ' [$state( $progress_current/$progress_total)]($style)'

[cmd_duration]
disabled = true
format = "[$duration]($style) "
style = "yellow"

[username]
style_user = "fg:bright-blue bg:#3c3836"
style_root = "fg:bold red bg:#3c3836"
format = "[$user]($style)"
# show_always = true

[hostname]
# ssh_only = false
style = "fg:bright-yellow bg:#3c3836"
ssh_symbol = "ΌυΒ "
format = "[@$hostname]($style)"

[aws]
symbol = "ΌΝ╜  "

[c]
symbol = "Όαη "
style = 'fg:bright-yellow bg:#3c3836'
version_format = '${raw}'
format = '[$symbol($version(-$name))]($style)'

[docker_context]
symbol = "ΎΝΙ "
format = '[$symbol($version(-$name))]($style)'

[elixir]
disabled = true
symbol = "Όαφ "
version_format = '${raw}'
style = 'fg:bright-purple bg:#3c3836'
format = '[$symbol$version]($style)'

[custom.elixir]
symbol = "Όαφ "
style = 'fg:bright-purple bg:#3c3836'
command = "elixir --short-version"
format = '[$symbol$output]($style)'
detect_files = ['mix.exs']

[golang]
symbol = "≤░θΥ "
style = 'fg:bright-blue bg:#3c3836'
format = '[$symbol($version(-$name))]($style)'

[lua]
symbol = "Όαι "

[memory_usage]
symbol = "≤░Ξδ "

[meson]
symbol = "≤░Φ╖ "

[nix_shell]
symbol = "ΎΝΥ "

[zig]
symbol = "Όγσ "
style = 'fg:bright-purple bg:#3c3836'
format = '[$symbol$version]($style)'

[nodejs]
symbol = "Όεα "
style = "fg:green bg:#3c3836"
version_format = '${raw}'
format = '[$symbol($version)]($style)'

[os.symbols]

[sudo]
disabled = true
style = 'bright-purple'
symbol = '´é£'
format = '[$symbol]($style)'

[character]
success_symbol = "[ÔØ»](blue)"
error_symbol = "[ÔØ»](red)"
vimcmd_symbol = "[ÔØ«](green)"

[directory]
read_only = " ¾░î¥"
read_only_style = "fg:bright-red bg:#3c3836"
style = "fg:yellow bg:#3c3836"
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = "¾░İ¼ "
truncation_length = 40
style = "fg:bright-cyan bg:#3c3836"
